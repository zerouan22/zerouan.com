<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>INC. Forum · Profilo</title>
  <meta name="description" content="Profilo pubblico utente del forum INC." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="forum.css" />
  <link rel="stylesheet" href="community.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body data-theme="dark">
  <div class="site-bg"></div>
  <header class="topbar">
    <a class="brand" href="forum.html"><span class="brand-mark">Z</span><span class="brand-text">INC. Forum</span></a>
    <nav class="main-nav" id="pageNav" aria-label="Navigazione principale"></nav>
    <div class="top-actions">
      <button id="themeBtn" class="icon-btn" type="button">◐</button>
      <a href="notifications.html" class="icon-btn">🔔</a>
      <a href="forum.html" class="icon-btn">⌂</a>
    </div>
  </header>
  <main class="community-shell">
    <section id="profileHero" class="community-profile-hero"></section>
    <section class="community-two-up" style="margin-top:18px">
      <article class="community-page-panel">
        <p class="eyebrow">Thread pubblicati</p>
        <div id="profileThreads" class="community-clean-list"></div>
      </article>
      <article class="community-page-panel">
        <p class="eyebrow">Commenti recenti</p>
        <div id="profileComments" class="community-clean-list"></div>
      </article>
    </section>
    <section id="savedSection" class="community-page-panel hidden" style="margin-top:18px">
      <p class="eyebrow">Post salvati</p>
      <div id="savedThreads" class="community-clean-list"></div>
    </section>
  </main>
  <script src="forum-core.js"></script>
  <script src="profile.js"></script>
</body>
</html>
